name: Validacoes Basicas

on:
  pull_request:
  push:
    branches: ["main", "Test"]

jobs:
  validate:
    name: Validate Python App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m compileall CookieManager.py dashboard.py

      - name: Smoke test imports
        run: python - <<'PY'
          import CookieManager
          import dashboard
          print("Imports ok")
          PY

      - name: Validate Docker build
        run: docker build -t obs-ci:test .
