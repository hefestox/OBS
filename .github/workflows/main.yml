name: OBS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project files
        run: |
          set -e
          test -f README.md
          test -f requirements.txt
          test -f Dockerfile
          test -f docker-compose.yml
          test -f docker-stack.yml
          test -f dashboard.py
          test -f CookieManager.py
          test -d .github/agents
          test -d .github/skills
          test -d .github/workflows
          test -d .github/ISSUE_TEMPLATE

      - name: Validate issue templates exist
        run: |
          set -e
          test -f .github/ISSUE_TEMPLATE/01-feature-request.yml
          test -f .github/ISSUE_TEMPLATE/02-bug-report.yml
          test -f .github/ISSUE_TEMPLATE/03-technical-task.yml
          test -f .github/ISSUE_TEMPLATE/04-documentation.yml
          test -f .github/ISSUE_TEMPLATE/05-testing.yml

  lint-python:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile dashboard.py
          python -m py_compile CookieManager.py

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run P0 hardening gate with coverage
        run: pytest -q tests/test_p0_hardening.py --cov=dashboard --cov-fail-under=20

      - name: Run full pytest suite
        run: pytest -q

  validate-docker:
    name: Validate Docker Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-stack syntax
        run: docker compose -f docker-stack.yml config --quiet
