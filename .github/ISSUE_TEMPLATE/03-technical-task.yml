name: 🔧 Technical Task / Refactoring
description: Tarefa técnica para refatoração, automação, governança ou higiene estrutural do pacote
title: "[TECH]: "
labels: ["technical", "refactoring", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🔧 Tarefa Técnica
        
        Use este template para refatorações, automações, padronizações e melhorias estruturais do pacote.

  - type: dropdown
    id: task-type
    attributes:
      label: Tipo de Tarefa
      description: Qual tipo de tarefa técnica?
      options:
        - Refatoração de código
        - Otimização de performance
        - Melhoria de arquitetura
        - Atualização de dependências
        - Migração de banco de dados
        - Melhoria de segurança
        - Code cleanup
        - Automação de testes
        - CI/CD
        - DevOps/Infraestrutura
        - Outro
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      description: Qual a prioridade desta tarefa?
      options:
        - P0 - Crítica (bloqueante)
        - P1 - Alta (importante)
        - P2 - Média (desejável)
        - P3 - Baixa (pode aguardar)
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Área do Pacote
      description: Qual parte do pacote será afetada?
      options:
        - Agents
        - Skills
        - Templates
        - Memória
        - Workflows / GitHub Actions
        - Documentação
        - Governança transversal
        - Múltiplas áreas
        - Outro
    validations:
      required: true

  - type: textarea
    id: current-situation
    attributes:
      label: Situação Atual
      description: Descreva o estado atual do código/sistema
      placeholder: |
        Qual é o problema técnico atual?
        Por que esta tarefa é necessária?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Solução Proposta
      description: Como você propõe resolver/melhorar?
      placeholder: |
        Descreva a solução técnica proposta:
        - Abordagem técnica
        - Arquivos impactados
        - Mudanças em discovery, governança ou automação
        - Impacto em outras partes do pacote
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefícios
      description: Quais os benefícios desta melhoria?
      placeholder: |
        - Melhoria de performance: X%
        - Redução de complexidade
        - Melhor manutenibilidade
        - Melhor previsibilidade de uso
        - Menor redundância
        - Segurança aprimorada
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Riscos e Impactos
      description: Quais os riscos e impactos desta mudança?
      placeholder: |
        - Breaking changes
        - Mudança de comportamento de agents/skills
        - Necessidade de revisão de memória/histórico
        - Necessidade de atualização de documentação
    validations:
      required: false

  - type: textarea
    id: technical-details
    attributes:
      label: Detalhes Técnicos
      description: Informações técnicas adicionais
      placeholder: |
        **Arquivos/Classes afetados:**
        - tech-lead.agent.md
        - AGENTS.md
        - skills/.../SKILL.md
        
        **Dependências:**
        - workflow X
        - template Y
        
        **Padrões:**
        - desambiguação de escopo
        - consolidação de governança
        - automação documental

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Critérios de Aceitação
      description: Como saber que a tarefa está completa?
      placeholder: |
        - [ ] Código refatorado e testado
        - [ ] Links e frontmatter validados
        - [ ] Documentação atualizada
        - [ ] Impacto em memória/histórico avaliado
        - [ ] Breaking changes documentados se houver
    validations:
      required: true

  - type: dropdown
    id: estimated-effort
    attributes:
      label: Estimativa de Esforço
      description: Quanto tempo essa tarefa deve levar?
      options:
        - XS (1-2 horas)
        - S (3-8 horas)
        - M (1-2 dias)
        - L (3-5 dias)
        - XL (1-2 semanas)
        - XXL (2+ semanas)
        - A definir
    validations:
      required: false

  - type: checkboxes
    id: related-areas
    attributes:
      label: Áreas Relacionadas
      description: Marque as áreas do sistema que serão afetadas
      options:
        - label: Agents
        - label: Skills
        - label: Templates
        - label: Memória
        - label: Workflows
        - label: Documentação
        - label: Discovery / descrições
        - label: Segurança

  - type: textarea
    id: testing-strategy
    attributes:
      label: Estratégia de Testes
      description: Como esta mudança será testada?
      placeholder: |
        - Testes unitários para ...
        - Validação de links e frontmatter
        - Revisão cruzada de arquivos afetados
        - Execução de workflow aplicável

  - type: textarea
    id: migration-plan
    attributes:
      label: Plano de Migração
      description: Se aplicável, como migrar do estado atual para o novo?
      placeholder: |
        1. Preparação e leitura da baseline
        2. Atualização dos arquivos centrais
        3. Ajuste de templates/skills/workflows relacionados
        4. Validação
        5. Registro em memória/histórico se necessário

  - type: textarea
    id: references
    attributes:
      label: Referências
      description: Links úteis, artigos, documentação
      placeholder: |
        - Documento relacionado: README.md / AGENTS.md / CONTRIBUTING.md
        - Artigo: https://...
        - Issue relacionada: #123
        - PR relacionado: #456

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Esta tarefa está alinhada com a governança do pacote
          required: true
        - label: Considerei o impacto em agents, templates, skills, memória ou workflows existentes
          required: true
        - label: Defini critérios claros de aceitação
          required: true
